<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: white;
}

.title {
    text-align: center;
    margin: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    padding: 0 40px;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 220px; /* ukuran fix biar rapi */
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
}

.btn {
    background: orange;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <h3>Menu Saya</h3>
</div>

<h2 class="title">Makanan</h2>

<div class="grid">

    <div class="card">
        <img src="thiwul.jpeg">
        <h3>Thiwul</h3>
        <a href="detail1.html"><button class="btn">Detail</button></a>
    </div>

    <div class="card">
        <img src="gudeg.jpeg">
        <h3>Gudeg</h3>
        <a href="detail2.html"><button class="btn">Detail</button></a>
    </div>

    <div class="card">
        <img src="bakpia.jpeg">
        <h3>Bakpia</h3>
        <a href="detail3.html"><button class="btn">Detail</button></a>
    </div>

</div>

<h2 class="title">Minuman</h2>

<div class="grid">

    <div class="card">
        <img src="cendol.jpeg">
        <h3>Cendol</h3>
        <a href="detail4.html"><button class="btn">Detail</button></a>
    </div>

    <div class="card">
        <img src="wedang.jpeg">
        <h3>Wedang</h3>
        <a href="detail5.html"><button class="btn">Detail</button></a>
    </div>

    <div class="card">
        <img src="WedangUwuh.jpeg">
        <h3>Wedang Uwuh</h3>
        <a href="detail6.html"><button class="btn">Detail</button></a>
    </div>

</div>

</body>
</html>
